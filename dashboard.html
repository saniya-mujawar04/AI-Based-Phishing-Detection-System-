<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        .stats {
            margin: 20px;
        }

        .stats p {
            font-size: 18px;
            margin: 5px;
        }

        .chart-box {
            width: 350px;
            height: 350px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

<h1>Phishing Detection Dashboard</h1>

<div class="stats">
    <p>Total URLs: {{ total }}</p>
    <p>Phishing: {{ phishing }}</p>
    <p>Safe: {{ safe }}</p>
    <p>Average Risk: {{ avg_risk }}%</p>
</div>

<!-- Graph -->
<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Phishing', 'Safe'],
        datasets: [{
            data: [{{ phishing }}, {{ safe }}]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

<h2>Recent Scans</h2>

<table>
<tr>
    <th>URL</th>
    <th>Result</th>
    <th>Risk (%)</th>
</tr>

{% for row in recent %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
